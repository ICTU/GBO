publiccodeYmlVersion: "0.5"

name: Project Start Architectuur GBO
url: https://github.com/tomootes/GBO
softwareType: configurationFiles
developmentStatus: development

description:
  nl:
    shortDescription: >-
      Project Startarchitectuur voor het programma Gemeenschappelijke
      BronOntsluiting (GBO) / Delen via Toestemming naar Private Partijen
      (DvTP).
    longDescription: |
      De Project Start Architectuur (PSA) voor het programma DvTP/GBO beschrijft
      de generieke infrastructuur en het afsprakenstelsel waarmee gegevens van
      overheidsorganisaties beschikbaar kunnen worden gemaakt voor burgers,
      private partijen en Europese toepassingen zoals EDI Wallet en Single
      Digital Gateway (SDG/OOTS).

      De PSA beschrijft de context en doelstelling van de oplossing, de
      architectuurprincipes en kaders, het capability model, de generieke
      functies en de logische architectuur. De technische invulling volgt in
      een aparte software-architectuur.
    features:
      - Project Startarchitectuur
      - Diagrammen in Mermaid formaat
      - Use cases voor het project

