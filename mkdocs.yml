site_name: Gemeenschappelijke Bronontsluiting
site_description: Documentatie voor GBO
site_author: ICTU
site_url: https://ictu.github.io/GBO/

repo_url: https://github.com/ICTU/GBO
repo_name: ICTU/GBO
edit_uri: edit/main/docs/

theme:
  name: material
  language: custom
  custom_dir: overrides
  palette:
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - navigation.path
    - toc.follow

markdown_extensions:
  - tables
  - footnotes
  - sane_lists
  - pymdownx.highlight:
      anchor_linenums: true
  - admonition
  - attr_list
  # Mermaid diagrammen
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  # Automatische inhoudsopgave
  - toc:
      permalink: true
      toc_depth: 2
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/pdf.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascript/mermaid-init.js
  - javascript/print.js

extra:
  version:
    provider: mike
    alias: true

plugins:
  - search
  - mike:
      canonical_version: "latest"
  - print-site:
      add_to_navigation: false
      print_page_title: "Gemeenschappelijke Brontontsluiting"
      add_cover_page: true
      cover_page_template: "docs/assets/templates/voorblad.tpl"
      enumerate_headings: true
      enumerate_figures: false
      add_table_of_contents: true
      toc_title: "Inhoudsopgave"
      toc_depth: 2
      exclude:
        - underconstruction_to.md
        - underconstruction_tr.md
        - underconstruction_sem.md
        - readme.md

nav:
  # Huidige repository: lokale navigatie.
  # Dit wordt de actieve tab en de onderliggende items blijven in de linkerkolom zichtbaar.
  - Gemeenschappelijke Bronontsluiting: index.md
#      - Introductie: index.md
#      - Begrippen: begrippen.md
#      - Werkwijze: werkwijze.md
  - Context: context.md
  - Globaal Ontwerp: https://ictu.github.io/GBO-GO/
  - Projectstartarchitectuur: https://ictu.github.io/GBO-PSA/
  - Technisch Ontwerp: underconstruction_to.md
  - Technische Requirements: underconstruction_tr.md
  - Semantiek: underconstruction_sem.md
